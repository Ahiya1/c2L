name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  site-quality:
    name: Site - Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  site-test:
    name: Site - Tests
    runs-on: ubuntu-latest
    needs: site-quality
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - run: npm ci

      - name: Run Tests
        run: npm run test

  site-build:
    name: Site - Build
    runs-on: ubuntu-latest
    needs: [site-quality, site-test]
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

  reach-quality:
    name: Reach - Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reach
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: reach/package-lock.json

      - run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

  reach-test:
    name: Reach - Tests
    runs-on: ubuntu-latest
    needs: reach-quality
    defaults:
      run:
        working-directory: reach
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: reach/package-lock.json

      - run: npm ci

      - name: Run Tests
        run: npm run test

  workflow-validation:
    name: Workflow - Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run validation suite
        run: bash __tests__/run-all.sh
