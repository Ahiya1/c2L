      - "Mobile responsive, OG/SEO metadata"

    dependencies:
      iteration_dependencies: []
      external_dependencies:
        - "c2l.dev domain registrar access for DNS configuration"
        - "Vercel account (active, authenticated)"

    success_criteria:
      - "Deal structure is defined: phases, pricing, deliverables, exit ramps"
      - "c2l.dev loads and serves the main page"
      - "Customs offer page communicates the problem and solution in Hebrew"
      - "CTA is clear and actionable for an Israeli customs broker"
      - "Mobile responsive, Hebrew RTL renders correctly"

