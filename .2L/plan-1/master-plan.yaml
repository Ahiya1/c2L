      - "Contact schema: customs broker contacts (name, company, email, role, location, stage)"
      - "Research and find 10 real customs broker leads with verified emails"
      - "Hebrew email templates that name the specific pain and link to c2l.dev/customs"
      - "Gmail MCP integration for sending through Claude Code"
      - "Campaign management and tracking"
